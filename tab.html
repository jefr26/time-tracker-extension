<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time Tracker — Full View</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #161616; --surface2: #1e1e1e;
    --border: #2a2a2a; --accent: #c8f564; --accent2: #6495f5;
    --text: #e8e8e8; --muted: #666; --danger: #f56464;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; padding: 40px 24px;
  }
  .container { max-width: 720px; margin: 0 auto; }

  header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px;
  }
  .logo { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 300; }
  .logo span { color: var(--accent); }

  .week-nav { display: flex; align-items: center; gap: 10px; }
  .week-nav button {
    background: none; border: 1px solid var(--border); color: var(--muted);
    width: 26px; height: 26px; cursor: pointer; font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .week-nav button:hover { border-color: var(--accent); color: var(--accent); }
  .week-range { font-size: 0.72rem; color: var(--text); }

  .input-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .input-group { display: flex; gap: 8px; }

  .project-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.78rem;
    padding: 0 12px; height: 44px; cursor: pointer; min-width: 130px; transition: border-color 0.2s;
  }
  .project-select:focus { outline: none; border-color: var(--accent); }
  .task-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem;
    padding: 0 16px; height: 44px; transition: border-color 0.2s;
  }
  .task-input:focus { outline: none; border-color: var(--accent); }
  .task-input::placeholder { color: var(--muted); }

  .time-input {
    width: 80px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem;
    padding: 0 12px; height: 44px; text-align: center;
    transition: border-color 0.2s;
  }
  .time-input:focus { outline: none; border-color: var(--accent2); }
  .time-input::placeholder { color: var(--muted); }

  .btn-start {
    background: var(--accent); color: #0f0f0f; border: none;
    font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500;
    padding: 0 20px; height: 44px; cursor: pointer; transition: all 0.15s;
  }
  .btn-start:hover { background: #d9ff70; }
  .btn-start.running { background: var(--danger); color: #fff; }

  .btn-add-manual {
    background: none; border: 1px solid var(--accent2); color: var(--accent2);
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    padding: 0 20px; height: 44px; cursor: pointer; transition: all 0.15s;
  }
  .btn-add-manual:hover { background: var(--accent2); color: #0f0f0f; }

  .active-timer {
    background: var(--surface); border: 1px solid var(--accent);
    padding: 12px 16px; margin-bottom: 28px;
    display: none; align-items: center; gap: 12px;
  }
  .active-timer.visible { display: flex; }
  .timer-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .timer-info { flex: 1; }
  .timer-task { font-size: 0.85rem; }
  .timer-project { font-size: 0.68rem; color: var(--accent2); margin-top: 2px; }
  .timer-elapsed { font-size: 1.3rem; font-family: 'Fraunces', serif; font-weight: 300; color: var(--accent); }

  .section-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 8px; margin-top: 28px; }
  .summary-box { background: var(--surface); border: 1px solid var(--border); }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
  .summary-row:last-child { border-bottom: none; }
  .summary-project { font-size: 0.64rem; color: var(--muted); text-transform: uppercase; }
  .summary-hours { color: var(--accent); }
  .week-total-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 12px; background: var(--surface2); border: 1px solid var(--border); border-top: none; }
  .week-total-label { font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .week-total-hours { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 300; color: var(--accent); }

  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-top: 28px; }
  .tab { background: none; border: none; color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 14px; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; margin-top: 8px; }
  .tab-content.active { display: block; }

  .entry { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); margin-bottom: 5px; background: var(--surface); }
  .entry-badge { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border: 1px solid var(--accent2); color: var(--accent2); white-space: nowrap; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-task { font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
  .entry-duration { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 300; min-width: 72px; text-align: right; }
  .btn-delete { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.82rem; padding: 3px; opacity: 0; transition: all 0.15s; }
  .entry:hover .btn-delete { opacity: 1; }
  .btn-delete:hover { color: var(--danger); }
  .empty-state { text-align: center; padding: 28px; color: var(--muted); font-size: 0.78rem; border: 1px dashed var(--border); }

  .project-manager { margin-top: 36px; border-top: 1px solid var(--border); padding-top: 20px; }
  .add-project-row { display: flex; gap: 8px; }
  .project-input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem; padding: 0 12px; height: 36px; }
  .project-input:focus { outline: none; border-color: var(--accent2); }
  .project-input::placeholder { color: var(--muted); }
  .btn-add-proj { background: none; border: 1px solid var(--accent2); color: var(--accent2); font-family: 'DM Mono', monospace; font-size: 0.72rem; padding: 0 14px; height: 36px; cursor: pointer; transition: all 0.15s; }
  .btn-add-proj:hover { background: var(--accent2); color: #0f0f0f; }
  .projects-list { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .project-tag { font-size: 0.68rem; padding: 4px 10px; border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .project-tag button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; line-height: 1; padding: 0; transition: color 0.15s; }
  .project-tag button:hover { color: var(--danger); }
  footer { margin-top: 50px; text-align: center; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">time<span>.</span>tracker</div>
    <div class="week-nav">
      <button id="btnPrevWeek">‹</button>
      <span class="week-range" id="weekRange">This week</span>
      <button id="btnNextWeek">›</button>
    </div>
  </header>

  <div class="input-row">
    <div class="input-group">
      <select class="project-select" id="projectSelect"></select>
      <input class="task-input" id="taskInput" type="text" placeholder="Task name..." />
      <button class="btn-start" id="btnStart">▶ Start</button>
    </div>
    <div class="input-group">
      <input class="time-input" id="manualTime" type="text" placeholder="0:00" title="Format H:MM or M" />
      <button class="btn-add-manual" id="btnAddManual" style="flex: 1">+ Add manual time</button>
    </div>
  </div>

  <div class="active-timer" id="activeTimer">
    <div class="timer-dot"></div>
    <div class="timer-info">
      <div class="timer-task" id="timerTask"></div>
      <div class="timer-project" id="timerProject"></div>
    </div>
    <div class="timer-elapsed" id="timerElapsed">00:00:00</div>
  </div>

  <div class="section-label">Weekly summary</div>
  <div class="summary-box" id="weeklySummary"></div>
  <div class="week-total-bar">
    <span class="week-total-label">Week total</span>
    <span class="week-total-hours" id="weekTotal">0h 00m</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="week">This week</button>
    <button class="tab" data-tab="all">All</button>
  </div>
  <div class="tab-content active" id="tab-week"></div>
  <div class="tab-content" id="tab-all"></div>

  <div class="project-manager">
    <div class="section-label" style="margin-top:0">Projects</div>
    <div class="add-project-row">
      <input class="project-input" id="projectInput" type="text" placeholder="New project..." />
      <button class="btn-add-proj" id="btnAddProject">+ Add</button>
    </div>
    <div class="projects-list" id="projectsList"></div>
  </div>
  <footer>data saved locally · private</footer>
</div>
<script src="popup.js"></script>
</body>
</html>
