<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Time Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f564;
    --accent2: #6495f5;
    --text: #e8e8e8;
    --muted: #666;
    --danger: #f56464;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    width: 400px;
    min-height: 300px;
    max-height: 600px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* scrollbar */
  body::-webkit-scrollbar { width: 4px; }
  body::-webkit-scrollbar-track { background: var(--bg); }
  body::-webkit-scrollbar-thumb { background: var(--border); }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem; font-weight: 300; letter-spacing: -0.01em;
  }
  .logo span { color: var(--accent); }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    background: none; border: 1px solid var(--border); color: var(--muted);
    width: 26px; height: 26px; cursor: pointer; font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-icon[title="Semana anterior"]:hover,
  .btn-icon[title="Semana siguiente"]:hover { border-color: var(--muted); color: var(--text); }

  .week-chip {
    font-size: 0.62rem; color: var(--muted); padding: 3px 8px;
    border: 1px solid var(--border); white-space: nowrap;
  }

  main { padding: 12px 16px 16px; }

  /* Input row */
  .input-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .input-group { display: flex; gap: 6px; }

  .project-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    padding: 0 8px; height: 36px; cursor: pointer; width: 110px;
    transition: border-color 0.2s;
  }
  .project-select:focus { outline: none; border-color: var(--accent); }

  .task-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem;
    padding: 0 10px; height: 36px;
    transition: border-color 0.2s;
  }
  .task-input:focus { outline: none; border-color: var(--accent); }
  .task-input::placeholder { color: var(--muted); }

  .time-input {
    width: 60px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem;
    padding: 0 8px; height: 36px; text-align: center;
    transition: border-color 0.2s;
  }
  .time-input:focus { outline: none; border-color: var(--accent2); }
  .time-input::placeholder { color: var(--muted); }

  .btn-start {
    background: var(--accent); color: #0f0f0f; border: none;
    font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 500;
    padding: 0 12px; height: 36px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-start:hover { background: #d9ff70; }
  .btn-start.running { background: var(--danger); color: #fff; }
  .btn-start.running:hover { background: #ff7a7a; }

  .btn-add-manual {
    background: none; border: 1px solid var(--accent2); color: var(--accent2);
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    padding: 0 10px; height: 36px; cursor: pointer; transition: all 0.15s;
  }
  .btn-add-manual:hover { background: var(--accent2); color: #0f0f0f; }

  /* Active timer */
  .active-timer {
    background: var(--surface); border: 1px solid var(--accent);
    padding: 8px 12px; margin-bottom: 12px;
    display: none; align-items: center; gap: 10px;
  }
  .active-timer.visible { display: flex; }

  .timer-dot {
    width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
    flex-shrink: 0; animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .timer-info { flex: 1; min-width: 0; }
  .timer-task { font-size: 0.78rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .timer-project { font-size: 0.62rem; color: var(--accent2); margin-top: 1px; }
  .timer-elapsed {
    font-size: 1.1rem; font-family: 'Fraunces', serif; font-weight: 300;
    color: var(--accent); min-width: 78px; text-align: right;
  }

  /* Weekly summary */
  .section-label {
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 6px; margin-top: 14px;
  }

  .summary-box { background: var(--surface); border: 1px solid var(--border); }

  .summary-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-project { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .summary-hours { color: var(--accent); font-weight: 500; font-size: 0.78rem; }

  .week-total-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-top: none;
  }
  .week-total-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .week-total-hours { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 300; color: var(--accent); }

  /* Entries */
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-top: 14px; }
  .tab {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 6px 12px;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; margin-top: 6px; }
  .tab-content.active { display: block; }

  .entry {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border: 1px solid var(--border);
    margin-bottom: 4px; background: var(--surface);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }

  .entry-badge {
    font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 1px 5px; border: 1px solid var(--accent2); color: var(--accent2);
    white-space: nowrap; flex-shrink: 0;
  }
  .entry-info { flex: 1; min-width: 0; }
  .entry-task { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }
  .entry-duration { font-family: 'Fraunces', serif; font-size: 0.9rem; font-weight: 300; min-width: 60px; text-align: right; }
  .btn-delete {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.75rem; padding: 2px; opacity: 0; transition: all 0.15s;
  }
  .entry:hover .btn-delete { opacity: 1; }
  .btn-delete:hover { color: var(--danger); }

  .empty-state {
    text-align: center; padding: 20px; color: var(--muted); font-size: 0.72rem;
    border: 1px dashed var(--border);
  }

  /* Projects panel */
  .projects-panel {
    display: none; padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
  }
  .projects-panel.open { display: block; }

  .add-project-row { display: flex; gap: 6px; }
  .project-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem;
    padding: 0 10px; height: 32px;
  }
  .project-input:focus { outline: none; border-color: var(--accent2); }
  .project-input::placeholder { color: var(--muted); }

  .btn-add-proj {
    background: none; border: 1px solid var(--accent2); color: var(--accent2);
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    padding: 0 10px; height: 32px; cursor: pointer; transition: all 0.15s;
  }
  .btn-add-proj:hover { background: var(--accent2); color: #0f0f0f; }

  .projects-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .project-tag {
    font-size: 0.65rem; padding: 3px 8px; border: 1px solid var(--border);
    color: var(--muted); display: flex; align-items: center; gap: 5px;
  }
  .project-tag button {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.75rem; line-height: 1; padding: 0; transition: color 0.15s;
  }
  .project-tag button:hover { color: var(--danger); }

  .btn-expand {
    background: none; border: none; color: var(--accent2); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 0; transition: color 0.15s;
  }
  .btn-expand:hover { color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">time<span>.</span>tracker</div>
  <div class="header-actions">
    <button class="btn-icon" data-i18n-title="prevWeekTitle" id="btnPrevWeek">‹</button>
    <span class="week-chip" id="weekRange" data-i18n="thisWeek">This week</span>
    <button class="btn-icon" data-i18n-title="nextWeekTitle" id="btnNextWeek">›</button>
    <button class="btn-icon" data-i18n-title="projectsTitle" id="btnToggleProjects" style="margin-left:4px">⊞</button>
    <button class="btn-icon" data-i18n-title="openTabTitle" id="btnOpenTab">⤢</button>
  </div>
</div>

<main>
  <!-- Input -->
  <div class="input-row">
    <div class="input-group">
      <select class="project-select" id="projectSelect"></select>
      <input class="task-input" id="taskInput" type="text" data-i18n-placeholder="taskPlaceholder" />
      <button class="btn-start" id="btnStart" data-i18n-title="startStopTimerTitle">▶</button>
    </div>
    <div class="input-group">
      <input class="time-input" id="manualTime" type="text" placeholder="0:00" data-i18n-title="formatHMTitle" />
      <button class="btn-add-manual" id="btnAddManual" style="flex: 1" data-i18n="manualEntryBtn">+ Manual Entry</button>
    </div>
  </div>

  <!-- Active timer -->
  <div class="active-timer" id="activeTimer">
    <div class="timer-dot"></div>
    <div class="timer-info">
      <div class="timer-task" id="timerTask"></div>
      <div class="timer-project" id="timerProject"></div>
    </div>
    <div class="timer-elapsed" id="timerElapsed">00:00:00</div>
  </div>

  <!-- Weekly summary -->
  <div class="section-label" data-i18n="thisWeek">Week</div>
  <div class="summary-box" id="weeklySummary"></div>
  <div class="week-total-bar">
    <span class="week-total-label" data-i18n="weekTotal">Total</span>
    <span class="week-total-hours" id="weekTotal">0h 00m</span>
  </div>

  <!-- Log -->
  <div class="tabs">
    <button class="tab active" data-tab="week" data-i18n="thisWeek">This week</button>
    <button class="tab" data-tab="all" data-i18n="allTab">All</button>
  </div>
  <div class="tab-content active" id="tab-week"></div>
  <div class="tab-content" id="tab-all"></div>
</main>

<!-- Projects panel -->
<div class="projects-panel" id="projectsPanel">
  <div class="section-label" style="margin-top:0" data-i18n="projectsTitle">Projects</div>
  <div class="add-project-row">
    <input class="project-input" id="projectInput" type="text" data-i18n-placeholder="newProjectPlaceholder" />
    <button class="btn-add-proj" id="btnAddProject" data-i18n="addBtn">+ Add</button>
  </div>
  <div class="projects-list" id="projectsList"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
